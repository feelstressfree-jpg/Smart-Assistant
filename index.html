<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Assistant: Professional real-time voice-to-voice translation tool.">
    <title>Smart Assistant - Discreet Professional Translation</title>
    <style>
        /* Light Mode (Default) */
        :root {
            --bg: #ffffff;
            --container-bg: #ffffff;
            --text: #333;
            --border: #ddd;
            --top-bar-border: #f0f0f0;
            --monitor-bg: #f9f9f9;
            --title-color: #555;
            --btn-bg: #fdfdfd;
        }

        /* Dark Mode Styles */
        [data-theme="dark"] {
            --bg: #121212;
            --container-bg: #1e1e1e;
            --text: #e0e0e0;
            --border: #333;
            --top-bar-border: #333;
            --monitor-bg: #252525;
            --title-color: #aaa;
            --btn-bg: #2a2a2a;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .smart-container { max-width: 900px; margin: auto; border: 1px solid var(--border); border-radius: 8px; padding: 20px; background: var(--container-bg); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--top-bar-border); padding-bottom: 10px; margin-bottom: 20px; }
        .title { font-size: 14px; font-weight: bold; color: var(--title-color); text-transform: uppercase; }
        
        .settings { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        select { border: 1px solid var(--border); padding: 5px; border-radius: 4px; font-size: 12px; background: var(--btn-bg); color: var(--text); }
        
        .control-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px; background: var(--btn-bg); color: var(--text); transition: 0.2s; }
        button.active { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }
        
        .display-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .monitor-box { border: 1px solid var(--border); padding: 15px; border-radius: 6px; min-height: 150px; background: var(--monitor-bg); }
        .label { font-size: 10px; color: #999; margin-bottom: 8px; font-weight: bold; }
        .content { font-size: 15px; line-height: 1.6; color: var(--text); }

        .slider-box { font-size: 12px; color: #666; display: flex; align-items: center; gap: 10px; }
        input[type="range"] { width: 80px; }

        .theme-toggle {
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            font-size: 12px;
            color: var(--text);
        }
    </style>
</head>
<body>

<div class="smart-container" id="mainApp">
    <div class="top-bar">
        <div class="title">Internal Smart Assistant Protocol v4.5</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button class="theme-toggle" onclick="toggleTheme()">DARK MODE</button>
            <div class="slider-box">
                Opacity: <input type="range" min="10" max="100" value="100" oninput="document.body.style.opacity = this.value/100">
            </div>
        </div>
    </div>

    <div class="settings">
        <select id="inputLang">
            <option value="hi-IN">Source: Hindi</option>
            <option value="en-US">Source: English</option>
            <option value="fr-FR">Source: French</option>
            <option value="de-DE">Source: German</option>
            <option value="es-ES">Source: Spanish</option>
        </select>
        <select id="targetLang">
            <option value="en-US">Output: English</option>
            <option value="hi-IN">Output: Hindi</option>
            <option value="es-ES">Output: Spanish</option>
            <option value="fr-FR">Output: French</option>
            <option value="de-DE">Output: German</option>
            <option value="ja-JP">Output: Japanese</option>
            <option value="zh-CN">Output: Chinese</option>
            <option value="ru-RU">Output: Russian</option>
            <option value="pt-PT">Output: Portuguese</option>
            <option value="it-IT">Output: Italian</option>
            <option value="ko-KR">Output: Korean</option>
            <option value="pa-IN">Output: Punjabi</option>
        </select>
        <div style="margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 12px;">
            <input type="checkbox" id="voiceToggle" checked> Voice Output
        </div>
    </div>

    <div class="control-btns">
        <button id="startBtn">ACTIVATE SMART MODE</button>
        <button onclick="location.reload()">RESET SYSTEM</button>
    </div>

    <div class="display-area">
        <div class="monitor-box">
            <div class="label">INCOMING STREAM (TEXT)</div>
            <div id="userSpeech" class="content">...</div>
        </div>
        <div class="monitor-box">
            <div class="label">PROCESSED DATA (TRANSLATION)</div>
            <div id="translatedText" class="content" style="font-weight: 500;">...</div>
        </div>
    </div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const userSpeechDiv = document.getElementById('userSpeech');
    const translatedTextDiv = document.getElementById('translatedText');
    const voiceToggle = document.getElementById('voiceToggle');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = false;

    let isListening = false;
    let isSpeaking = false;

    function toggleTheme() {
        const body = document.body;
        if (body.hasAttribute('data-theme')) {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    }

    startBtn.onclick = () => {
        if (!isListening) {
            recognition.lang = document.getElementById('inputLang').value;
            recognition.start();
            startBtn.innerText = "ASSISTANT ACTIVE";
            startBtn.classList.add('active');
            isListening = true;
        } else {
            recognition.stop();
            startBtn.innerText = "ACTIVATE SMART MODE";
            startBtn.classList.remove('active');
            isListening = false;
        }
    };

    recognition.onresult = async (event) => {
        if (isSpeaking) return; // Agar AI bol raha hai toh input ignore karein

        const text = event.results[event.results.length - 1][0].transcript;
        userSpeechDiv.innerText = text;

        const from = document.getElementById('inputLang').value.split('-')[0];
        const to = document.getElementById('targetLang').value.split('-')[0];

        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`);
            const data = await res.json();
            const result = data[0][0][0];
            
            translatedTextDiv.innerText = result;
            
            if (voiceToggle.checked) {
                speak(result, document.getElementById('targetLang').value);
            }
        } catch (e) {
            console.log("Translation error");
        }
    };

    function speak(text, langCode) {
        isSpeaking = true;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = langCode;
        
        msg.onstart = () => {
            // Speech ke waqt mic band kar sakte hain taaki loop na bane
        };

        msg.onend = () => {
            isSpeaking = false;
        };

        window.speechSynthesis.speak(msg);
    }

    recognition.onerror = () => {
        isListening = false;
        startBtn.classList.remove('active');
        startBtn.innerText = "ACTIVATE SMART MODE";
    };
</script>

</body>
</html>
