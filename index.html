<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Multilingual Translator</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #1c1e21;
            --accent: #007bff;
            --secondary-bg: #e4e6eb;
        }

        [data-theme="dark"] {
            --bg-color: #18191a;
            --card-bg: #242526;
            --text-color: #e4e6eb;
            --accent: #45bd62;
            --secondary-bg: #3a3b3c;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: all 0.4s ease;
        }

        .card {
            background: var(--card-bg);
            width: 90%;
            max-width: 450px;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--secondary-bg);
            background: var(--secondary-bg);
            color: var(--text-color);
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }

        .btn-mic {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
            font-weight: bold;
        }

        .btn-mic:active { transform: scale(0.98); }

        #status {
            margin: 15px 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .result-area {
            background: var(--secondary-bg);
            padding: 20px;
            border-radius: 10px;
            min-height: 80px;
            margin-top: 10px;
            line-height: 1.5;
            text-align: left;
        }

        .theme-toggle {
            cursor: pointer;
            padding: 8px;
            background: var(--secondary-bg);
            border-radius: 50%;
            border: none;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0;">Translator AI</h2>
        <button class="theme-toggle" onclick="toggleTheme()" title="Change Mode">🌓</button>
    </div>

    <p style="font-size: 0.9rem; margin-bottom: 10px;">Bhasha chunein:</p>
    <select id="langList">
        <option value="hi-IN">Hindi (हिन्दी)</option>
        <option value="en-US">English (US)</option>
        <option value="en-GB">English (UK)</option>
        <option value="fr-FR">French (Français)</option>
        <option value="es-ES">Spanish (Español)</option>
        <option value="de-DE">German (Deutsch)</option>
        <option value="ja-JP">Japanese (日本語)</option>
        <option value="ru-RU">Russian (Pусский)</option>
        <option value="pt-BR">Portuguese (Português)</option>
        <option value="zh-CN">Chinese (Mandarin)</option>
    </select>

    <button class="btn-mic" id="micBtn">🎤 Bolna Shuru Karein</button>
    
    <div id="status">Taiyaar hai...</div>

    <div class="result-area" id="output">
        Aapka bola hua text yahan dikhega...
    </div>
</div>

<script>
    const micBtn = document.getElementById('micBtn');
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const langList = document.getElementById('langList');

    let isListening = false;
    let recognition;

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false; // "What are you doing" loop ko rokne ke liye
        recognition.interimResults = false;

        recognition.onstart = () => {
            status.innerText = "Sun raha hoon... Kripya bolein.";
            micBtn.style.filter = "hue-rotate(90deg)";
            isListening = true;
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            output.innerText = text;
            status.innerText = "Suna gaya!";
        };

        recognition.onerror = (e) => {
            status.innerText = "Error: " + e.error;
            stopMic();
        };

        recognition.onend = () => {
            stopMic();
        };
    } else {
        status.innerText = "Aapka browser voice support nahi karta.";
    }

    function stopMic() {
        isListening = false;
        micBtn.style.filter = "none";
        status.innerText = "Taiyaar hai...";
    }

    micBtn.onclick = () => {
        if (!isListening) {
            recognition.lang = langList.value;
            recognition.start();
        } else {
            recognition.stop();
        }
    };

    function toggleTheme() {
        const body = document.body;
        if (body.hasAttribute('data-theme')) {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    }
</script>

</body>
</html>
