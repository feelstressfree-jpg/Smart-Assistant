<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Translator Pro</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #212529;
            --primary: #4361ee;
            --secondary: #e9ecef;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --primary: #4cc9f0;
            --secondary: #333333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: 0.3s;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 480px;
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid var(--secondary);
            background: var(--secondary);
            color: var(--text);
            font-size: 16px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        #startBtn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        #startBtn:disabled { background: #ccc; cursor: not-allowed; }

        .status {
            margin: 15px 0;
            font-size: 14px;
            color: var(--primary);
            font-weight: 500;
            height: 20px;
        }

        .output-container {
            text-align: left;
            margin-top: 20px;
        }

        .box {
            background: var(--secondary);
            padding: 15px;
            border-radius: 12px;
            margin-top: 8px;
            min-height: 50px;
            font-size: 16px;
        }

        .theme-btn {
            background: var(--secondary);
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">Voice AI</h2>
        <button class="theme-btn" onclick="toggleTheme()">🌓</button>
    </div>

    <label style="display:block; text-align:left; margin-bottom:8px; font-size:14px;">Select Target Language:</label>
    <select id="langSelect">
        <option value="en">English (US)</option>
        <option value="hi">Hindi (हिन्दी)</option>
        <option value="es">Spanish (Español)</option>
        <option value="fr">French (Français)</option>
        <option value="de">German (Deutsch)</option>
        <option value="ja">Japanese (日本語)</option>
        <option value="zh">Chinese (Mandarin)</option>
        <option value="ru">Russian (Русский)</option>
        <option value="ar">Arabic (العربية)</option>
        <option value="pt">Portuguese (Português)</option>
        <option value="it">Italian (Italiano)</option>
        <option value="ko">Korean (한국어)</option>
        <option value="tr">Turkish (Türkçe)</option>
        <option value="nl">Dutch (Nederlands)</option>
        <option value="pa">Punjabi (ਪੰਜਾਬੀ)</option>
    </select>

    <button id="startBtn">Click to Speak</button>
    <div class="status" id="status">Ready</div>

    <div class="output-container">
        <div style="font-size:12px; opacity:0.7">Recognized Text:</div>
        <div class="box" id="userInput">...</div>
        
        <div style="font-size:12px; opacity:0.7; margin-top:15px;">Translated Text:</div>
        <div class="box" id="translatedOutput" style="border-left: 4px solid var(--primary);">...</div>
    </div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const userInput = document.getElementById('userInput');
    const translatedOutput = document.getElementById('translatedOutput');
    const langSelect = document.getElementById('langSelect');

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'hi-IN'; 
    recognition.continuous = false; // Maanushik loop rokne ke liye
    recognition.interimResults = false;

    startBtn.onclick = () => {
        try {
            recognition.start();
            status.innerText = "Listening...";
            startBtn.disabled = true;
        } catch(e) { console.log("Already started"); }
    };

    recognition.onresult = async (event) => {
        // Step 1: Pehle sunna band karo taaki loop na bane
        recognition.stop(); 
        
        const text = event.results[0][0].transcript;
        userInput.innerText = text;
        status.innerText = "Translating...";

        const target = langSelect.value;
        
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${target}&dt=t&q=${encodeURI(text)}`);
            const data = await res.json();
            const translatedText = data[0][0][0];
            
            translatedOutput.innerText = translatedText;
            status.innerText = "Speaking...";
            speak(translatedText, target);
        } catch (err) {
            status.innerText = "Translation Error";
            startBtn.disabled = false;
        }
    };

    function speak(text, lang) {
        // Voice khatam hone par hi button wapas enable hoga
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        
        utterance.onend = () => {
            status.innerText = "Ready";
            startBtn.disabled = false;
        };

        window.speechSynthesis.speak(utterance);
    }

    recognition.onerror = () => {
        status.innerText = "Try again...";
        startBtn.disabled = false;
    };

    recognition.onend = () => {
        if(status.innerText === "Listening...") {
            status.innerText = "Ready";
            startBtn.disabled = false;
        }
    };

    function toggleTheme() {
        document.body.getAttribute('data-theme') === 'dark' 
            ? document.body.removeAttribute('data-theme') 
            : document.body.setAttribute('data-theme', 'dark');
    }
</script>

</body>
</html>
