<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Assistant: Professional real-time voice-to-voice translation tool for discreet office meetings. Instantly translates English to Hindi and other languages without noise.">
    <meta name="keywords" content="professional, real-time, voice, to voice, translator, discrete, translation, English, Hindi, office, meeting, Smart Assistant, voice-over-voice">
    <meta name="author" content="Smart Assistant Pro">
    <title>Smart Assistant - Discreet Professional Translation</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #ffffff; color: #333; margin: 0; padding: 20px; transition: opacity 0.3s; }
        .smart-container { max-width: 900px; margin: auto; border: 1px solid #ddd; border-radius: 8px; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 20px; }
        .title { font-size: 14px; font-weight: bold; color: #555; text-transform: uppercase; }
        
        .settings { display: flex; gap: 10px; margin-bottom: 15px; }
        select { border: 1px solid #ccc; padding: 5px; border-radius: 4px; font-size: 12px; }
        
        .control-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px; background: #fdfdfd; }
        button.active { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }
        
        .display-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .monitor-box { border: 1px solid #eee; padding: 15px; border-radius: 6px; min-height: 150px; background: #f9f9f9; }
        .label { font-size: 10px; color: #999; margin-bottom: 8px; font-weight: bold; }
        .content { font-size: 15px; line-height: 1.6; color: #444; }

        /* Sliders for stealth */
        .slider-box { font-size: 12px; color: #666; display: flex; align-items: center; gap: 10px; }
        input[type="range"] { width: 100px; }
    </style>
</head>
<body>

<div class="smart-container" id="mainApp">
    <div class="top-bar">
        <div class="title">Internal Smart Assistant Protocol v4.2</div>
        <div class="slider-box">
            Visibility: <input type="range" min="10" max="100" value="100" oninput="document.body.style.opacity = this.value/100">
        </div>
    </div>

    <div class="settings">
        <select id="inputLang">
            <option value="en-US">Source: English</option>
            <option value="hi-IN">Source: Hindi</option>
            <option value="es-ES">Source: Spanish</option>
            <option value="fr-FR">Source: French</option>
        </select>
        <select id="targetLang">
            <option value="hi-IN">Output: Hindi</option>
            <option value="en-US">Output: English</option>
        </select>
        <div style="margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 12px;">
            <input type="checkbox" id="voiceToggle" checked> Voice Output (Speaker)
        </div>
    </div>

    <div class="control-btns">
        <button id="startBtn">ACTIVATE SMART MODE</button>
        <button onclick="location.reload()">RESET SYSTEM</button>
    </div>

    <div class="display-area">
        <div class="monitor-box">
            <div class="label">INCOMING STREAM (TEXT)</div>
            <div id="userSpeech" class="content">...</div>
        </div>
        <div class="monitor-box" style="background: #fff;">
            <div class="label">PROCESSED DATA (TRANSLATION)</div>
            <div id="translatedText" class="content" style="color: #000; font-weight: 500;">...</div>
        </div>
    </div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const userSpeechDiv = document.getElementById('userSpeech');
    const translatedTextDiv = document.getElementById('translatedText');
    const voiceToggle = document.getElementById('voiceToggle');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = false;

    let isListening = false;

    startBtn.onclick = () => {
        if (!isListening) {
            recognition.lang = document.getElementById('inputLang').value;
            recognition.start();
            startBtn.innerText = "ASSISTANT ACTIVE";
            startBtn.classList.add('active');
            isListening = true;
        } else {
            recognition.stop();
            startBtn.innerText = "ACTIVATE SMART MODE";
            startBtn.classList.remove('active');
            isListening = false;
        }
    };

    recognition.onresult = async (event) => {
        const text = event.results[event.results.length - 1][0].transcript;
        userSpeechDiv.innerText = text;

        const from = document.getElementById('inputLang').value.split('-')[0];
        const to = document.getElementById('targetLang').value.split('-')[0];

        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
            const data = await res.json();
            const result = data.responseData.translatedText;
            
            translatedTextDiv.innerText = result;
            
            // Voice tabhi chalegi agar box checked ho
            if (voiceToggle.checked) {
                speak(result, document.getElementById('targetLang').value);
            }
        } catch (e) {
            console.log("Network delay...");
        }
    };

    function speak(text, langCode) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = langCode;
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }

    recognition.onerror = () => {
        isListening = false;
        startBtn.classList.remove('active');
    };
</script>

</body>
</html>
